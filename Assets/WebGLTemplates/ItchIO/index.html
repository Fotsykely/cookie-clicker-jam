<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #game-title {
      color: #ffffff;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(255, 200, 100, 0.6);
    }

    #progress-container {
      width: min(340px, 70vw);
    }

    #progress-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    #progress-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.75rem;
      text-align: center;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* ── Error overlay ── */
    #error-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 20;
      color: #ff6b6b;
      padding: 24px;
      text-align: center;
    }

    #error-overlay.visible { display: flex; }
    #error-overlay h2 { margin-bottom: 12px; }
    #error-overlay p  { color: rgba(255,255,255,0.6); font-size: 0.85rem; max-width: 480px; }
  </style>
</head>
<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <div id="loading-overlay">
    <div id="game-title">{{{ PRODUCT_NAME }}}</div>
    <div id="progress-container">
      <div id="progress-bar-bg">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-label">Loading...</div>
    </div>
  </div>

  <div id="error-overlay">
    <h2>Failed to load</h2>
    <p id="error-message">An error occurred while loading the game.</p>
  </div>

  <script>
    var canvas   = document.getElementById("unity-canvas");
    var overlay  = document.getElementById("loading-overlay");
    var fill     = document.getElementById("progress-bar-fill");
    var label    = document.getElementById("progress-label");
    var errBox   = document.getElementById("error-overlay");
    var errMsg   = document.getElementById("error-message");

    // Make canvas fill the window and stay responsive
    function resizeCanvas() {
      canvas.style.width  = window.innerWidth  + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function setProgress(p) {
      var pct = Math.round(p * 100);
      fill.style.width = pct + "%";
      label.textContent = pct < 100 ? "Loading... " + pct + "%" : "Starting...";
    }

    function showError(msg) {
      errMsg.textContent = msg || "An unexpected error occurred.";
      errBox.classList.add("visible");
      overlay.classList.add("hidden");
    }

    var buildUrl   = "Build";
    var loaderUrl  = buildUrl + "/{{{ UNITY_WEBGL_LOADER_URL }}}";

    var config = {
      dataUrl:             buildUrl + "/{{{ UNITY_DATA_URL }}}",
      frameworkUrl:        buildUrl + "/{{{ UNITY_FRAMEWORK_URL }}}",
      codeUrl:             buildUrl + "/{{{ UNITY_CODE_URL }}}",
#if UNITY_SYMBOLS_FILENAME
      symbolsUrl:          buildUrl + "/{{{ UNITY_SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl:  "StreamingAssets",
      companyName:         "{{{ COMPANY_NAME }}}",
      productName:         "{{{ PRODUCT_NAME }}}",
      productVersion:      "{{{ PRODUCT_VERSION }}}",
      canvas:              canvas,
    };

    var script    = document.createElement("script");
    script.src    = loaderUrl;
    script.onload = function () {
      createUnityInstance(canvas, config, setProgress)
        .then(function (instance) {
          overlay.classList.add("hidden");
          // Remove overlay from DOM after fade completes
          setTimeout(function () { overlay.remove(); }, 500);
        })
        .catch(function (err) {
          showError(err ? err.toString() : undefined);
        });
    };
    script.onerror = function () {
      showError("Could not load the Unity loader script. Please refresh the page.");
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
